<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Monthsary</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to bottom right, #1e2a38, #3c4f65);
      color: #fff;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-family: 'Pacifico', cursive;
      font-size: 3rem;
      color: #ff6b6b;
    }
    h2 {
      font-size: 2.5rem;
      color: #f9ca24;
      margin: 1rem 0;
    }
    .heart {
      color: red;
      font-size: 2rem;
    }
    .message {
      font-size: 2rem;
      font-weight: bold;
      color: #f1f1f1;
      margin-top: 1rem;
    }
    .button {
      margin-top: 2rem;
      background-color: #27ae60;
      color: white;
      padding: 1rem 2rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.3s;
    }
    .button:hover {
      background-color: #2ecc71;
    }
    .icons {
      margin-top: 3rem;
      display: flex;
      justify-content: center;
      gap: 2rem;
      font-size: 2rem;
    }
    @media (max-width: 600px) {
      h1 { font-size: 2rem; }
      h2 { font-size: 1.5rem; }
      .message { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <h1>Happy Monthsary, My Love!</h1>
  <h2>Icon <span class="heart">❤</span> Joff</h2>
  <div class="message">I LOVE YOU MORE</div>
  <button class="button">Merge Our Hearts</button>

  <div class="icons">
    <span>💻</span>
    <span>🚀</span>
    <span>🎈</span>
    <span>🐙</span>
  </div>
</body>
</html>
